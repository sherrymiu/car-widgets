<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Cabin Widgets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: #000;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        header p {
            font-size: 1.2rem;
            color: #666;
            font-weight: 400;
            letter-spacing: -0.3px;
        }

        .widgets-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 60px;
        }

        @media (min-width: 768px) {
            .widgets-grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 30px;
            }
        }

        .widget-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            transition: box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .widget-card:hover {
            box-shadow: 0 12px 16px rgba(0, 0, 0, 0.1);
        }

        .widget-card:active {
            transform: scale(0.98);
        }

        .widget-content {
            padding: 0;
            position: relative;
            overflow: hidden;
            aspect-ratio: 1;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .widget-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            pointer-events: none;
        }

        .widget-title {
            padding: 24px 24px 20px 24px;
            background: white;
        }

        .widget-title h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #000;
            margin: 0;
            letter-spacing: -0.3px;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #e5e5e7;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 2rem;
            }

            header p {
                font-size: 1rem;
            }

            .container {
                padding: 40px 20px;
            }

            header {
                margin-bottom: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Car Cabin Widgets</h1>
            <p>智能座舱年轻化交互设计</p>
        </header>

        <div class="widgets-grid">
            <!-- Fish Tank Widget -->
            <a href="fish-tank-widget.html" class="widget-card">
                <div class="widget-content">
                    <iframe src="fish-tank-widget.html" title="Fish Tank Widget"></iframe>
                </div>
                <div class="widget-title">
                    <h2>Fish Tank</h2>
                </div>
            </a>

            <!-- Vinyl DJ Widget -->
            <a href="vinyl-dj-widget.html" class="widget-card">
                <div class="widget-content">
                    <iframe src="vinyl-dj-widget.html" title="Vinyl DJ Widget"></iframe>
                </div>
                <div class="widget-title">
                    <h2>Vinyl DJ</h2>
                </div>
            </a>

            <!-- Mood Jar Widget -->
            <a href="mood-jar-widget.html" class="widget-card">
                <div class="widget-content">
                    <iframe src="mood-jar-widget.html" title="Mood Jar Widget"></iframe>
                </div>
                <div class="widget-title">
                    <h2>Mood Jar</h2>
                </div>
            </a>
        </div>

        <footer>
            © 2026 Car Cabin Design Concept
        </footer>
    </div>
</body>
</html>
